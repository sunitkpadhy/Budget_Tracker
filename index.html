<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Budget Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Budget Tracker</h1>
    <div class="month-picker">
      <label for="monthSelect">Viewing:</label>
      <input type="month" id="monthSelect" />
    </div>
  </header>

  <main>
    <section class="card form-card">
      <h2>Add expense</h2>
      <form id="expenseForm" autocomplete="off">
        <div class="row">
          <label>
            Date
            <input type="date" id="date" required />
          </label>
          <label>
            Amount
            <input type="number" id="amount" min="0.01" step="0.01" placeholder="0.00" required />
          </label>
        </div>
        <div class="row">
          <label>
            Category
            <select id="category" required></select>
          </label>
          <label>
            New category
            <div class="inline">
              <input type="text" id="newCategory" placeholder="e.g. Travel" />
              <button type="button" id="addCategoryBtn">Add</button>
            </div>
          </label>
        </div>
        <label>
          Description
          <input type="text" id="description" placeholder="optional" />
        </label>
        <button type="submit" class="primary">Add expense</button>
      </form>
    </section>

    <section class="card summary-card">
      <h2>Monthly summary</h2>
      <div class="totals">
        <div>
          <span class="label">Total spent</span>
          <span class="value" id="totalSpent">0.00</span>
        </div>
        <div>
          <span class="label">Entries</span>
          <span class="value" id="entryCount">0</span>
        </div>
        <div>
          <span class="label">Top category</span>
          <span class="value" id="topCategory">—</span>
        </div>
      </div>
      <h3>By category</h3>
      <ul id="categoryBreakdown" class="breakdown"></ul>
    </section>

    <section class="card list-card">
      <h2>Expenses</h2>
      <table id="expenseTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Category</th>
            <th>Description</th>
            <th class="right">Amount</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="expenseBody"></tbody>
      </table>
      <p id="emptyHint" class="empty">No expenses for this month yet.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
